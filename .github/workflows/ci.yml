name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

  ios-build:
    name: Build for iOS Simulator
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme WaveformKit

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -scheme WaveformKit \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO
